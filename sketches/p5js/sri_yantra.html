<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sri Yantra — Sacred Geometry</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; display:flex; flex-direction:column; align-items:center; font-family:'Courier New',monospace; color:#FF4500; }
    #controls { display:flex; gap:10px; padding:10px; flex-wrap:wrap; justify-content:center; }
    button, select { background:#1A0000; border:1px solid #FF4500; color:#FF4500; padding:5px 12px; cursor:pointer; font-family:monospace; font-size:11px; }
    button:hover, select:hover { background:#FF450022; }
    label { font-size:11px; display:flex; align-items:center; gap:6px; }
    input[type=range] { width:70px; accent-color:#FF4500; }
    #info { font-size:9px; opacity:0.4; padding:4px; text-align:center; }
  </style>
</head>
<body>
<div id="controls">
  <label>Scale: <input type="range" id="scale" min="0.5" max="1.5" value="1" step="0.05"><span id="sc-v">1.0</span></label>
  <label>Speed: <input type="range" id="speed" min="0" max="3" value="0.5" step="0.1"><span id="spd-v">0.5</span></label>
  <select id="colorMode">
    <option value="tantric">TANTRIC FIRE</option>
    <option value="plasma">PLASMA</option>
    <option value="gold">GOLD</option>
    <option value="void">VOID</option>
  </select>
  <button id="toggleLotus">LOTUS ON</button>
  <button id="toggleBhupura">BHUPURA ON</button>
  <button id="toggleAnim">⏸ PAUSE</button>
</div>

<script>
new p5(function(p) {
  let t = 0, speed = 0.5, scl = 1;
  let animating = true, showLotus = true, showBhupura = true;
  let colorMode = 'tantric';

  // Sri Yantra triangle data:
  // Each row: [apexY, baseY, halfBaseWidth, pointsDown]
  // Normalized to 1.0 units, will be scaled to canvas
  // These are hand-tuned approximate values for visual correctness
  const TRIS = [
    // Layer 1 — innermost (central trikona)
    { aY: 0.08, bY: -0.17, hw: 0.175, down: false, layer: 0 },
    { aY: -0.11, bY: 0.18, hw: 0.19, down: true, layer: 0 },
    // Layer 2 — Ashtara (8 triangles)
    { aY: 0.23, bY: -0.27, hw: 0.29, down: false, layer: 1 },
    { aY: -0.24, bY: 0.28, hw: 0.30, down: true, layer: 1 },
    // Layer 3 — Dasara I
    { aY: 0.34, bY: -0.36, hw: 0.38, down: false, layer: 2 },
    { aY: -0.33, bY: 0.37, hw: 0.40, down: true, layer: 2 },
    // Layer 4 — Dasara II
    { aY: 0.43, bY: -0.44, hw: 0.46, down: false, layer: 3 },
    { aY: -0.41, bY: 0.46, hw: 0.48, down: true, layer: 3 },
    // Layer 5 — Chaturdashara (outermost)
    { aY: -0.50, bY: 0.54, hw: 0.56, down: true, layer: 4 },
  ];

  function getColor(layer, isDown) {
    const totalLayers = 5;
    let h;
    switch(colorMode) {
      case 'tantric':
        // Reds at center → oranges → golds outward
        h = p.map(layer, 0, totalLayers - 1, 0, 40) / 360;
        h += (isDown ? 0.01 : 0);
        break;
      case 'plasma':
        h = (layer / totalLayers + (isDown ? 0.5 : 0) + t * 0.05) % 1;
        break;
      case 'gold':
        h = 0.1 + layer * 0.005;
        break;
      case 'void':
        h = (0.55 + layer * 0.03 + t * 0.04) % 1;
        break;
    }
    // Animate hue gently
    h = (h + t * 0.02) % 1;
    const sat = 85 + 15 * Math.sin(t + layer);
    const bri = 55 + 20 * Math.sin(t * 1.3 + layer * 0.8);
    return p.color(`hsl(${Math.round(h * 360)},${sat}%,${bri}%)`);
  }

  function drawTriangle(tri, scale, lw) {
    const S = scale;
    const apex = p.createVector(0, tri.aY * S);
    const bl = p.createVector(-tri.hw * S, tri.bY * S);
    const br = p.createVector( tri.hw * S, tri.bY * S);

    const col = getColor(tri.layer, tri.down);
    const alpha = 180 + 60 * Math.sin(t * 2 + tri.layer);
    p.stroke(p.red(col), p.green(col), p.blue(col), alpha);
    p.strokeWeight(lw);

    // Glow layer
    p.stroke(p.red(col), p.green(col), p.blue(col), 50);
    p.strokeWeight(lw * 4);
    p.line(apex.x, apex.y, bl.x, bl.y);
    p.line(apex.x, apex.y, br.x, br.y);
    p.line(bl.x, bl.y, br.x, br.y);

    // Solid layer
    p.stroke(p.red(col), p.green(col), p.blue(col), alpha);
    p.strokeWeight(lw);
    p.line(apex.x, apex.y, bl.x, bl.y);
    p.line(apex.x, apex.y, br.x, br.y);
    p.line(bl.x, bl.y, br.x, br.y);
  }

  function drawLotusRing(outerR, innerR, petals, lw) {
    for (let i = 0; i < petals; i++) {
      const a1 = (i / petals) * Math.PI * 2;
      const a2 = ((i + 1) / petals) * Math.PI * 2;
      const amid = (a1 + a2) / 2;
      const tip1 = { x: Math.cos(a1) * outerR, y: Math.sin(a1) * outerR };
      const tip2 = { x: Math.cos(a2) * outerR, y: Math.sin(a2) * outerR };
      const inner = { x: Math.cos(amid) * innerR, y: Math.sin(amid) * innerR };
      const outer = { x: Math.cos(amid) * outerR * 1.05, y: Math.sin(amid) * outerR * 1.05 };

      const h = ((i / petals) + t * 0.06) % 1;
      p.stroke(p.color(`hsl(${Math.round(h * 360)},75%,55%)`));
      p.strokeWeight(lw);
      // Draw petal as two lines from inner to outer tips
      p.line(inner.x, inner.y, tip1.x, tip1.y);
      p.line(inner.x, inner.y, tip2.x, tip2.y);
      p.line(outer.x, outer.y, tip1.x, tip1.y);
      p.line(outer.x, outer.y, tip2.x, tip2.y);
    }
  }

  function drawBhupura(size, gateW, lw) {
    const h = (t * 0.03) % 1;
    p.stroke(p.color(`hsl(${Math.round((h * 30 + 30) % 360)},60%,50%)`));
    p.strokeWeight(lw * 0.7);
    p.noFill();

    // Draw 3 concentric squares
    for (let ring = 0; ring < 3; ring++) {
      const sz = size + ring * size * 0.06;
      const gw = gateW;

      // Top side (with gate)
      p.line(-sz, -sz, -gw, -sz);
      p.line(gw, -sz, sz, -sz);
      // Bottom
      p.line(-sz, sz, -gw, sz);
      p.line(gw, sz, sz, sz);
      // Left
      p.line(-sz, -sz, -sz, -gw);
      p.line(-sz, gw, -sz, sz);
      // Right
      p.line(sz, -sz, sz, -gw);
      p.line(sz, gw, sz, sz);

      // Gate extensions (T-prongs)
      const gExt = sz + sz * 0.12;
      const gHalf = gw * 0.8;
      if (ring === 0) {
        // Only add gates on outermost square
        [[0,-1],[0,1],[1,0],[-1,0]].forEach(([dx,dy]) => {
          const bx = dx * sz, by = dy * sz;
          const ex = dx * gExt, ey = dy * gExt;
          // Vertical gate prong
          p.line(bx - dy * gHalf, by - dx * gHalf, ex - dy * gHalf, ey - dx * gHalf);
          p.line(bx + dy * gHalf, by + dx * gHalf, ex + dy * gHalf, ey + dx * gHalf);
          p.line(ex - dy * gHalf, ey - dx * gHalf, ex + dy * gHalf, ey + dx * gHalf);
        });
      }
    }
  }

  p.setup = function() {
    const sz = Math.min(p.windowWidth, p.windowHeight, 700);
    const cv = p.createCanvas(sz, sz);
    cv.parent('sketch-container');
    p.noFill();

    document.getElementById('scale').addEventListener('input', function() {
      scl = parseFloat(this.value);
      document.getElementById('sc-v').textContent = scl.toFixed(2);
    });
    document.getElementById('speed').addEventListener('input', function() {
      speed = parseFloat(this.value);
      document.getElementById('spd-v').textContent = speed.toFixed(1);
    });
    document.getElementById('colorMode').addEventListener('change', e => colorMode = e.target.value);
    document.getElementById('toggleLotus').addEventListener('click', function() {
      showLotus = !showLotus;
      this.textContent = showLotus ? 'LOTUS ON' : 'LOTUS OFF';
    });
    document.getElementById('toggleBhupura').addEventListener('click', function() {
      showBhupura = !showBhupura;
      this.textContent = showBhupura ? 'BHUPURA ON' : 'BHUPURA OFF';
    });
    document.getElementById('toggleAnim').addEventListener('click', function() {
      animating = !animating;
      this.textContent = animating ? '⏸ PAUSE' : '▶ PLAY';
    });
  };

  p.draw = function() {
    p.background(0, 0, 0, 18);
    p.translate(p.width / 2, p.height / 2);

    if (animating) t += 0.006 * speed;

    const S = p.width * 0.38 * scl;
    const LW = 1.2;

    // ── 9 Triangles ────────────────────────────────────────────────
    TRIS.forEach(tri => drawTriangle(tri, S, LW));

    // ── Lotus rings ────────────────────────────────────────────────
    if (showLotus) {
      // Inner 8-petal lotus
      drawLotusRing(S * 0.58, S * 0.45, 8, LW * 0.7);
      // Outer 16-petal lotus
      drawLotusRing(S * 0.72, S * 0.62, 16, LW * 0.6);
      // Outer triple circle
      for (let i = 0; i < 3; i++) {
        const cr = S * (0.76 + i * 0.03);
        const h = (t * 0.04 + i * 0.1) % 1;
        p.stroke(p.color(`hsl(${Math.round(h * 360 * 0.3 + 30)},60%,50%)`));
        p.strokeWeight(0.5);
        p.circle(0, 0, cr * 2);
      }
    }

    // ── Bhupura square ─────────────────────────────────────────────
    if (showBhupura) {
      drawBhupura(S * 0.89, S * 0.22, LW * 0.7);
    }

    // ── Bindu ──────────────────────────────────────────────────────
    const binduPulse = 4 + 3 * Math.sin(t * 5);
    p.noStroke();
    p.fill(255, 215, 0, 220);
    p.circle(0, 0, binduPulse);
    // Bindu halo
    p.noFill();
    p.stroke(255, 215, 0, 40 + 30 * Math.sin(t * 5));
    p.strokeWeight(0.3);
    p.circle(0, 0, binduPulse * 4);

    // ── Layer labels (on hover or always in debug) ──────────────────
    p.fill(255, 60, 0, 60);
    p.noStroke();
    p.textSize(8);
    p.textAlign(p.CENTER);
    // Label the central point
    p.text('BINDU', 0, -S * 0.02);

    // ── Info ───────────────────────────────────────────────────────
    p.fill(255, 69, 0, 50);
    p.textAlign(p.LEFT);
    p.textSize(8);
    p.text('9 TRIANGLES: 5 SHAKTI (↓) + 4 SHIVA (↑)', -p.width/2 + 10, p.height/2 - 30);
    p.text('43 SUB-TRIANGLES | BHUPURA: 4 GATES', -p.width/2 + 10, p.height/2 - 18);
    p.text('BINDU → CREATION | CREATION → BINDU', -p.width/2 + 10, p.height/2 - 6);
  };

  p.windowResized = function() {
    const sz = Math.min(p.windowWidth, p.windowHeight, 700);
    p.resizeCanvas(sz, sz);
  };
});

const container = document.createElement('div');
container.id = 'sketch-container';
document.body.insertBefore(container, document.querySelector('#controls'));
document.body.appendChild(document.getElementById('controls'));
</script>

<div id="info">SRI YANTRA — 9 triangles (5 Shakti ↓ + 4 Shiva ↑) | 43 sub-triangles | 43 presiding deities | Bindu = unmanifest absolute</div>
</body>
</html>
