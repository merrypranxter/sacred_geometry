# Torus
name: "Torus"
aliases: ["Donut", "Ring surface", "Vortex form", "Apple surface (horn torus variant)"]
category: complex
subcategory: topological_form
complexity: intermediate

construction:
  method: algorithmic
  description: "Surface of revolution generated by rotating a circle around an axis coplanar with but not intersecting the circle."
  parametric_equations:
    x: "(R + r·cos(v))·cos(u)"
    y: "(R + r·cos(v))·sin(u)"
    z: "r·sin(v)"
    parameters:
      R: "Major radius (center of tube to center of torus)"
      r: "Minor radius (radius of the tube)"
      u: "Angle around the large circle [0, 2π]"
      v: "Angle around the tube [0, 2π]"

  variants:
    ring_torus: "R > r — standard donut, hole visible"
    horn_torus: "R = r — tube meets itself at center point"
    spindle_torus: "R < r — self-intersecting, apple-shaped"

mathematics:
  surface_area: "4π²Rr"
  volume: "2π²Rr²"
  
  topology:
    genus: 1  # One hole
    euler_characteristic: 0  # V - E + F = 0 for torus
    fundamental_group: "ℤ × ℤ (two independent loops)"
    orientable: true
    
  vortex_mathematics:
    description: >
      Marko Rodin's 'vortex math' — a pattern emerges doubling 1 repeatedly mod 9:
      1, 2, 4, 8, 7, 5, 1, 2, 4, 8, 7, 5... (period 6 sequence)
      This pattern maps onto the torus as a continuous spiraling path.
    note: "Vortex mathematics is numerology, not established science — but the patterns are beautiful."
    
  poloidal_toroidal:
    poloidal_direction: "Around the tube (v direction)"
    toroidal_direction: "Around the large circle (u direction)"
    magnetic_analogy: "Real magnetic tori in plasma physics (tokamak)"

physical_analogues:
  physics:
    - "Tokamak plasma containment (magnetic torus)"
    - "Smoke rings (vortex ring)"
    - "Magnetic field of Earth (rough torus)"
    - "Ball lightning (proposed torus structure)"
  biology:
    - "Red blood cell (biconcave disk, near-torus)"
    - "Vortex rings in dolphin bubble play"
    - "Heart field geometry (some researchers claim torus)"
  cosmology:
    - "Possible topology of the universe (torus cosmology models)"
    - "Black hole accretion disk (toroidal)"

symbolism:
  traditions:
    esoteric:
      - "The self-sustaining, self-referential field"
      - "How the universe 'breathes' — energy goes in one pole, out the other"
      - "The fundamental shape of energy flow"
      - "The Fruit of Life / Metatron's Cube projects to torus topology"
    sacred_math:
      - "Only surface that can tile itself perfectly"
      - "The shape with no inside or outside (philosophically)"
  themes: ["Self-reference", "Continuous flow", "The eternal return", "Unity through circulation"]

color_palettes:
  psychedelic:
    - name: "Plasma Vortex"
      hex: ["#FF4500", "#FF8C00", "#FFD700", "#00FFCC", "#0080FF", "#8000FF"]
    - name: "Field Lines"
      hex: ["#00FF7F", "#00FFFF", "#007FFF", "#0000FF", "#8B00FF", "#FF00FF"]
  traditional:
    - name: "Electromagnetic Blue"
      hex: ["#001433", "#003087", "#0047AB", "#4169E1", "#87CEEB", "#E0F0FF"]

art_direction:
  aesthetic_tags:
    - "torus sacred geometry"
    - "vortex ring"
    - "donut topology"
    - "self-referential field"
    - "magnetic torus"
    - "energy vortex"
  prompt_fragments:
    - "Sacred torus vortex, energy field lines visible, plasma blue and gold, self-sustaining geometric form"
    - "Torus sacred geometry, 3D render, iridescent surface, field lines wrapping, cosmic energy form"
    - "Torus topology mandala, donut universe, neon plasma field, infinite interior space"
  glsl_notes: >
    Torus SDF: length(vec2(length(p.xz) - R, p.y)) - r
    where R = major radius, r = minor radius.
    For field lines: compute poloidal angle (atan2(p.y, length(p.xz) - R)) and toroidal angle (atan2(p.z, p.x)).
    Color by (poloidal_angle / TAU + time) mod 1 for flowing field lines.
    Add iridescent shading with Fresnel term: fresnel = pow(1 - dot(normal, viewDir), 3).

generative:
  p5js_sketch: "sketches/p5js/torus.html"
  shader_file: "shaders/fragment/torus.frag"
  key_parameters:
    R: 0.4  # major radius (normalized)
    r: 0.15  # minor radius (normalized)
    animate: true
    show_field_lines: true
    rotation_speed: 0.5
