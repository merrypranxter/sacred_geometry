art_direction:
  aesthetic_tags:
    - "golden spiral"
    - "logarithmic spiral"
    - "fibonacci spiral"
    - "phi ratio curve"
    - "divine proportion spiral"
    - "nautilus geometry"
    - "growth spiral"
    - "golden rectangle subdivision"
    - "equiangular spiral"
    - "self-similar curve"
  prompt_fragments:
    - "Golden spiral mandala, φ-based logarithmic curve, neon gradient from center, psychedelic glow"
    - "Fibonacci golden spiral, infinite zoom, self-similar recursion, crystalline iridescent"
    - "Golden ratio spiral on cosmic background, glowing φ geometry, mathematical divinity"
    - "Multiple overlapping golden spirals forming a mandala, rainbow interference patterns"
    - "Golden spiral as kundalini energy, serpentine divine proportion, tantric maximalist"
  glsl_notes: >
    Polar coordinates: r = exp(b * theta) where b = ln(phi)/(pi/2).
    In fragment shader: convert uv to polar (r, theta), check if log(r)/b mod (2π) ≈ theta.
    For spiral band: abs(fract(log(length(uv)) / log(phi^4)) - 0.5) < thickness.
    Animate: add time to theta offset for spinning spiral.
    Layer multiple spirals with different phase offsets for interference patterns.

generative:
  p5js_sketch: "sketches/p5js/golden_spiral.html"
  shader_file: "shaders/fragment/golden_spiral.frag"
  svg_generator: "svg/generators/golden_spiral.js"
  key_parameters:
    turns: 6              # number of full rotations
    a: 1.0               # scale factor
    b: 0.30634896        # ln(phi)/(pi/2)
    show_rectangles: true  # show the golden rectangle subdivision
    show_fibonacci: false  # show Fibonacci square approximation
    animate: true
    animation_type: "grow"  # grow | spin | zoom

