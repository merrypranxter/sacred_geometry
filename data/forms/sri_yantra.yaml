art_direction:
  aesthetic_tags:
    - "sri yantra"
    - "sri chakra"
    - "tantric mandala"
    - "nine triangles"
    - "shakti shiva union"
    - "vedic sacred geometry"
    - "43 sub-triangles"
    - "Hindu mysticism geometry"
    - "yoni yantra"
    - "bindu center"
    - "meru pyramid"
    - "lotus mandala"
    - "divine feminine geometry"
  prompt_fragments:
    - "Sri Yantra mandala, nine interlocking triangles, glowing saffron and red on black, bindu glowing at center"
    - "Sri Chakra sacred geometry, 43 sub-triangles, psychedelic neon, tantric maximalist, lotus petals and bhupura"
    - "Sri Yantra Meru (3D), pyramidal sacred geometry, gold and vermillion, hovering in cosmic space"
    - "Ultra-detailed Sri Yantra, intricate line precision, iridescent mandala, fractal depth at center bindu"
    - "Sri Yantra animation, triangles materializing layer by layer from bindu outward, electric tantric fire colors"
  glsl_notes: >
    Cannot be generated purely analytically — store precomputed triangle vertices.
    For real-time: use SDF of each triangle (9 SDFs), then compute intersection regions.
    Color by which 'layer' (count of enclosing triangles) the point is in.
    Animate: modulate each triangle's opacity/glow with sin(time × layer_index × 0.5).
    For Meru (3D): extrude each layer at increasing heights, apply cone transform.

generative:
  p5js_sketch: "sketches/p5js/sri_yantra.html"
