      hex: ["#FF00FF", "#9400D3", "#4B0082", "#7FFF00", "#00FFFF", "#FF1493"]
    - name: "Bioluminescent Grid"
      hex: ["#00FF7F", "#00FFFF", "#0080FF", "#7000FF", "#FF007F", "#FFFF00"]
    - name: "Solar Plasma"
      hex: ["#FF4500", "#FF8C00", "#FFD700", "#FFFF00", "#FFF8DC", "#FF6347"]
    - name: "Void Bloom"
