  traditional:
    - name: "Sacred Gold"
      hex: ["#FFD700", "#DAA520", "#B8860B", "#FFFFFF", "#C0C0C0", "#000000"]
    - name: "Temple Stone"
      hex: ["#D2B48C", "#8B7355", "#6B4226", "#F5DEB3", "#FAEBD7", "#C19A6B"]
    - name: "Lapis and Gold"
      hex: ["#003366", "#0047AB", "#1560BD", "#FFD700", "#FFF8DC", "#FFFFFF"]

art_direction:
  aesthetic_tags:
    - "sacred geometry"
    - "flower of life"
    - "hexagonal mandala"
    - "geometric mysticism"
    - "fractal circle matrix"
    - "psychedelic sacred"
    - "mathematical mysticism"
    - "neon geometry"
    - "bioluminescent grid"
    - "golden ratio overlay"
    - "cosmic blueprint"
    - "interconnected circles"
    - "vesica piscis lattice"
  prompt_fragments:
    - "Flower of Life mandala in neon plasma colors, glowing intersections, infinite recursion"
    - "Sacred hexagonal circle matrix, 19 overlapping circles, vesica piscis geometry, psychedelic iridescent"
    - "Flower of Life blueprint on black void, electric cyan lines, golden nodes at intersections"
    - "Animated Flower of Life, circles pulsing in phi-ratio waves, Lisa Frank maximalist color"
    - "Ultra-detailed sacred geometry mandala, Flower of Life matrix, fractal depth, cosmic horror beauty"
  glsl_notes: >
    Use hexagonal SDF (signed distance function) for base grid.
    Offset every other row by 0.5 × spacing.
    Animate by modulating circle radius r with sin(time + dist_from_center × 0.3).
    For color: use hue rotation based on angle to center (atan2) + time.
    Bloom/glow: add exponential falloff from circle edges.

generative:
  p5js_sketch: "sketches/p5js/flower_of_life.html"
  shader_file: "shaders/fragment/flower_of_life.frag"
  svg_generator: "svg/generators/flower_of_life.js"
  key_parameters:
    radius: 50         # pixels, base circle radius
    rings: 2           # number of hexagonal rings (2 = 19 circles)
    animate: true
    animation_type: "phi_wave"  # phi_wave | ripple | breathe | rotate
    color_mode: "hue_shift"     # hue_shift | plasma | void | traditional

references:
  - "Melchizedek, D. (1999). The Ancient Secret of the Flower of Life. Light Technology."
  - "Lawlor, R. (1982). Sacred Geometry: Philosophy and Practice. Thames & Hudson."
  - "Lundy, M. (2001). Sacred Geometry. Wooden Books."
  - "Critchlow, K. (1979). Time Stands Still: New Light on Megalithic Science."
  - "https://en.wikipedia.org/wiki/Overlapping_circles_grid"
