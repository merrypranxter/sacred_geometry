# Pythagorean Sacred Geometry
name: "Pythagorean / Greek"
tradition_type: "Philosophical-Mathematical"
primary_texts:
  - "Euclid — Elements (~300 BCE)"
  - "Plato — Timaeus (~360 BCE)"
  - "Plato — Republic (~380 BCE)"
  - "Pythagoras — (no direct writings survive)"
  - "Nicomachus — Introduction to Arithmetic (~100 CE)"
  - "Proclus — Commentary on Euclid (~450 CE)"

primary_geometric_forms:
  - "The five Platonic Solids"
  - "Tetractys"
  - "Pentagram (the Pythagorean symbol)"
  - "Golden ratio"
  - "The musical ratios"

pythagorean_brotherhood:
  founded: "~530 BCE, Croton (southern Italy)"
  core_beliefs:
    - "Number is the arche (first principle) of all things"
    - "The cosmos is mathematical in structure"
    - "Geometry is the language of the divine"
    - "Music and number are the same thing"
    - "The soul is immortal and mathematical"
  motto: "All is number"
  symbol: "The pentagram (five-pointed star) — encoded the golden ratio"
  
tetractys:
  name: "Tetractys (τετρακτύς)"
  form: "Triangular arrangement of 10 points in 4 rows (1+2+3+4)"
  diagram: |
    •
    • •
    • • •
    • • • •
  sacred_significance:
    row_1: "1 — Point, the monad, undivided unity"
    row_2: "2 — Line, duality, the dyad"
    row_3: "3 — Triangle, the first surface"
    row_4: "4 — Tetrahedron, the first solid"
    total: "10 = completion, perfection (Pythagorean perfect number)"
  musical_ratios:
    row_1_to_2: "1:2 = octave (diapason)"
    row_2_to_3: "2:3 = perfect fifth (diapente)"
    row_3_to_4: "3:4 = perfect fourth (diatessaron)"
  pythagorean_oath: "'By him who gave our soul the Tetractys'"

plato_geometry:
  timaeus_cosmogony:
    description: "Plato's geometric creation myth"
    demiurge: "The divine craftsman who orders the cosmos using geometry"
    
    four_elements_as_solids:
      fire: { solid: tetrahedron, reason: "Sharpest, most mobile — like fire" }
      earth: { solid: cube, reason: "Most stable, fills space — like earth" }
      air: { solid: octahedron, reason: "Held between fingers, spins freely" }
      water: { solid: icosahedron, reason: "Most sphere-like, flows easily" }
      cosmos: { solid: dodecahedron, reason: "'God used it for the whole'" }
    
    world_soul_geometry:
      description: "The demiurge constructs the World Soul from mathematical ratios"
      ratios: "1, 2, 3, 4, 9, 8, 27 (powers of 2 and 3)"
      musical_intervals: "These ratios generate the musical scale"
      cosmic_circles: "Two circles at an angle — the equator and ecliptic"

music_of_the_spheres:
  name: "Musica Universalis / Harmony of the Spheres"
  concept: "Planets move at speeds proportional to musical intervals — the cosmos literally sings"
  
  celestial_ratios:
    moon: "1 (base)"
    sun: "2 (octave from moon)"
    venus: "3/2 (fifth)"
    mercury: "4/3 (fourth)"
    mars: "2 (octave)"
    jupiter: "3 (octave + fifth)"
    saturn: "4 (double octave)"
  
  kepler_connection: >
    Johannes Kepler (Harmonices Mundi, 1619) discovered that planetary orbital 
    velocities at perihelion and aphelion produce musical intervals.
    Saturn's range: minor third. Jupiter: major third. Mars: fifth. Earth and Venus: 
    only a semitone (Earth is sadly almost monotone). This is real mathematics —
    not pseudoscience.

