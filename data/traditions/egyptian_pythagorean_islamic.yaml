# Islamic Sacred Geometry
name: "Islamic Geometric Art"
tradition_type: "Mathematical Art / Sacred Design"
primary_texts:
  - "Ikhwan al-Safa — Rasa'il (Epistles of the Brethren of Purity) (~970 CE)"
  - "Al-Kashi — Key of Arithmetic (1427 CE)"
  - "Al-Buzjani — On the Geometric Constructions Necessary for the Artisan"

context: >
  Islamic art prohibits figurative representation of God and humans in religious contexts.
  This prohibition drove the development of the most sophisticated geometric decorative
  tradition in history. Islamic geometric patterns are sacred mathematics made visible.

primary_forms:
  - "Girih (Persian: 'knot') — complex interlocking star patterns"
  - "Arabesque — flowing plant-based geometric curves"
  - "Muqarnas — 3D stalactite vaulting (honeycomb architecture)"
  - "Khatam — inlaid woodwork geometric marquetry"
  - "Zellij — geometric ceramic tilework (Morocco)"

star_polygons:
  description: "The Islamic tradition mastered star polygons unmatched anywhere in the world"
  
  primary_stars:
    6_pointed: "Hexagram — Star of David / Shield of Solomon — common throughout"
    8_pointed: "Rub el Hizb — appears on flags, most common Islamic star"
    10_pointed: "Dominant in Seljuk and Timurid art"
    12_pointed: "Common in Persian tilework"
    16_pointed: "Alhambra, Topkapi — extremely sophisticated"
    
  forbidden_star: >
    The 5-pointed star / pentagram is rare in Islamic art — its association with
    magic and pre-Islamic tradition made it suspect. The 10-pointed star (double
    pentagon) appears instead when 5-fold symmetry is needed.

key_geometric_principles:
  repeat_unit: "Typically: equilateral triangle, square, or hexagon as tiling base"
  
  self_similarity: >
    Many Islamic patterns exhibit self-similarity at multiple scales —
    centuries before the concept of fractals was formalized.
  
  aperiodic_tiling: >
    The Darb-i Imam shrine (Isfahan, 1453) contains patterns that are 
    mathematically equivalent to Penrose tilings — discovered by physicists
    in 1970. Islamic craftsmen solved this geometric challenge 500 years early.
    (Lu & Steinhardt, Science, 2007)
  
  compass_and_straightedge: >
    All Islamic geometric art was constructed with compass and straightedge only —
    no protractors, no trigonometry tables used by the artisans.
    The methods are encoded in illustrated manuscripts (e.g., al-Buzjani).

notable_examples:
  alhambra:
    location: "Granada, Spain"
    date: "13th–14th century"
    significance: >
      Contains all 17 wallpaper symmetry groups — mathematically proven in 1944.
      The craftsmen discovered them all empirically by the 14th century.
    
  topkapi_scroll:
    location: "Istanbul, Turkey"
    date: "~15th century"
    content: "Blueprint scroll showing geometric constructions for architectural patterns"
    significance: "Direct evidence of transmission of geometric knowledge"
    
  girih_tiles:
    description: "Set of 5 polygon tiles that generate complex star patterns"
    tiles:
      - "Regular decagon (10-sided)"
      - "Elongated hexagon"
      - "Bow-tie (non-convex hexagon)"
      - "Rhombus"
      - "Regular pentagon"
    property: "Any combination tiles aperiodically — Penrose-equivalent"

construction_methods:
  primary_method: "Compass and straightedge — all patterns constructible"
  starting_point: "Usually: divide a circle into n equal parts"
  
  6_fold_construction:
    - "Draw a circle"
    - "Step the radius around the circumference 6 times — perfect hexagon"
    - "Connect alternating points — two equilateral triangles"
    - "Connect every other point for hexagram"
    - "Extend lines — 12-pointed stars emerge"
  
  10_fold_construction:
    - "Draw a circle"
    - "Use φ (golden ratio) to divide into 10: φ = 2·sin(54°)"
    - "Draw the decagon"
    - "Connect points at intervals for star polygons {10/3}, {10/4} etc."

art_direction:
  aesthetic_tags:
    - "Islamic geometric pattern"
    - "arabesque sacred geometry"
    - "girih tile pattern"
    - "zellij ceramic mosaic"
    - "muqarnas architecture"
    - "star polygon Islamic"
    - "Alhambra pattern"
    - "Persian tile sacred"
    - "mathematical Islamic art"
  prompt_fragments:
    - "Islamic geometric pattern, intricate star polygon, zellige tile, turquoise and gold, infinite repeat"
    - "Girih pattern sacred geometry, aperiodic Islamic tiling, sapphire and lapis lazuli, mathematically precise"
    - "Alhambra-inspired sacred geometry, all 17 wallpaper groups, maximalist repeat pattern, gold on indigo"
    - "Muqarnas stalactite vault geometry, 3D Islamic sacred architecture, honeycomb self-similar structure"
    - "Islamic arabesque sacred geometry meets psychedelic neon — ancient math in modern light"
