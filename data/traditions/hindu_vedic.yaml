# Hindu / Vedic Sacred Geometry Tradition
# Yantra, Mandala, Vastu, Vedic mathematics

name: "Hindu / Vedic"
tradition_type: "Dharmic Religion / Vedic Science"
primary_languages: ["Sanskrit", "Tamil"]
primary_texts:
  - "Rigveda (~1500–1200 BCE) — earliest Vedic hymns"
  - "Shulba Sutras (~800–200 BCE) — earliest systematic geometry texts in the world"
  - "Arthashastra — governance including architecture"
  - "Manasara — treatise on architecture and sculpture"
  - "Vastu Shastra — sacred architecture"
  - "Tantrasara — tantric synthesis"
  - "Vamakeshvara Tantra — Sri Yantra source text"

primary_geometric_forms:
  - "Sri Yantra / Sri Chakra"
  - "Mandala (maṇḍala)"
  - "Vastu Purusha Mandala"
  - "Shri Chakra (same as Sri Yantra)"
  - "Navagraha chakra"
  - "Yantra (instrument)"

# ─── Yantra System ────────────────────────────────────────────────────────────
yantra_system:
  definition: >
    A yantra (यन्त्र, yantra = 'instrument', 'device') is a mystical diagram
    used in Hindu and Buddhist tantric traditions as an aid to meditation,
    worship, and ritual. A yantra is the geometric body of a deity — it IS
    the deity in geometric form.
  
  types:
    shaiva: "Yantras of Shiva deities"
    shakta: "Yantras of Devi/Shakti deities (most complex)"
    vaishnava: "Yantras of Vishnu"
    ganapatya: "Yantras of Ganesha"
    planetary: "Navagraha yantras for the 9 planets"
  
  components:
    bindu:
      name: "Bindu (बिन्दु)"
      meaning: "Point / dot"
      represents: "Unmanifest consciousness, the seed of all manifestation"
      geometry: "Dimensionless point"
    
    trikona:
      name: "Trikona (त्रिकोण)"
      meaning: "Triangle"
      upward: "Shiva — fire, masculine, consciousness"
      downward: "Shakti — water, feminine, energy"
      star: "Shatkonas (Star of David) = union of both"
    
    chakra:
      name: "Chakra (चक्र)"
      meaning: "Circle / wheel"
      represents: "Completeness, eternity, the divine"
    
    padma:
      name: "Padma (पद्म)"
      meaning: "Lotus"
      petal_counts: [4, 8, 12, 16, 32, 64, 1000]
      represents: "Purity, spiritual unfoldment, the chakras"
    
    bhupura:
      name: "Bhupura (भूपुर)"
      meaning: "Earth-city / ground"
      form: "Square with 4 gates (T-shaped openings at cardinal directions)"
      represents: "Earth element, physical manifestation, the temple walls"
      note: "The outer enclosure of all complete yantras"

# ─── Major Yantras ────────────────────────────────────────────────────────────
major_yantras:
  sri_yantra:
    name: "Sri Yantra / Sri Chakra"
    deity: "Tripura Sundari (Lalita)"
    tradition: "Shaktism"
    complexity: "Highest — considered the queen of all yantras"
    see_also: "data/forms/sri_yantra.yaml"
  
  kali_yantra:
    name: "Kali Yantra"
    deity: "Kali"
    form: "Eight-pointed star (two squares at 45°) in a circle, bhupura"
    represents: "Destruction, time, liberation, primordial darkness"
  
  durga_yantra:
    name: "Durga Yantra"
    deity: "Durga"
    form: "Ten-petaled lotus, triangle pointing down"
    represents: "Protection, shakti, victory over ego"
  
  ganesh_yantra:
    name: "Ganesh Yantra"
    deity: "Ganesha"
    form: "Hexagram with Ganesha bija mantra"
    represents: "Obstacle removal, beginnings, wisdom"
  
  surya_yantra:
    name: "Surya Yantra"
    deity: "Surya (Sun)"
    form: "Six-pointed star with 12 outer petals"
    represents: "Solar energy, health, vitality"

# ─── Mandala System ───────────────────────────────────────────────────────────
mandala_system:
  etymology: "Sanskrit: maṇḍala = circle + container of essence"
  
  types:
    tanka: "Painted mandala (thangka tradition)"
    sand: "Sand mandala (Tibetan Buddhist practice)"
    three_dimensional: "3D mandala / architectural mandala"
    vastu: "Architectural ground plan mandala"
  
  structure:
    center: "Bindu or deity image"
    rings: "Progressive enclosures from subtle to gross"
    gates: "Four cardinal direction gates"
    outer: "Square earth enclosure"
  
  vastu_purusha_mandala:
    name: "Vastu Purusha Mandala"
    form: "Grid of 8×8 = 64 or 9×9 = 81 squares"
    purpose: "Sacred architecture — aligns buildings with cosmic energies"
    purusha: "The cosmic being whose body IS the mandala"
    brahmasthana: "Sacred center zone — must remain open"
    zones:
      brahmana: "Center — Brahma / absolute"
      devika: "Surrounding zone — lesser deities"
      manushya: "Human zone — living areas"
      paishacha: "Outer zone — protective"
    note: "Hindu temples, homes, and cities are laid out on this grid"

# ─── Shulba Sutras ────────────────────────────────────────────────────────────
shulba_sutras:
  name: "Shulba Sutras (शुल्बसूत्र)"
  meaning: "Aphorisms of the cord/rope"
  date: "~800–200 BCE"
  purpose: "Precise geometric instructions for constructing Vedic fire altars (yajnas)"
  
  key_results:
    pythagorean_theorem: >
      States what we call the Pythagorean theorem centuries before Pythagoras.
      "The rope stretched along the length of the diagonal of a rectangle makes
      an area which the vertical and horizontal sides make together."
    
    pythagorean_triples: "Lists (3,4,5), (5,12,13), (8,15,17), (7,24,25) explicitly"
    
    squaring_the_circle: >
      Gives an approximation method (not exact — impossble, as proven later).
      Approximation: π ≈ (1 - 1/8 + 1/8×29 - 1/8×29×6 + 1/8×29×6×8)² ≈ 3.0883
    
    sqrt2_approximation: >
      "The diagonal of a square whose side is one unit is:
      1 + 1/3 + 1/(3×4) - 1/(3×4×34) = 577/408 ≈ 1.41421356..."
      Accurate to 5 decimal places — remarkable.
    
    altar_construction: >
      Fire altars must be precise geometric shapes (falcon, tortoise, wheel, etc.)
      and must maintain exact area while changing shape — a sophisticated geometric challenge.

