glsl_gradient_functions:
  description: "GLSL code snippets for applying these palettes in shaders"
  
  hue_cycle: |
    // Full hue cycle — maps 0-1 to full rainbow
    vec3 hueCycle(float t) {
      t = fract(t); // wrap
      return 0.5 + 0.5 * cos(6.28318 * (t + vec3(0.0, 0.333, 0.667)));
    }
    
  bioluminescent: |
    // Bioluminescent palette — green to cyan to blue
    vec3 biolumin(float t) {
      t = clamp(t, 0.0, 1.0);
      return mix(
        mix(vec3(0.0, 1.0, 0.5), vec3(0.0, 1.0, 1.0), t),
        mix(vec3(0.0, 1.0, 1.0), vec3(0.0, 0.5, 1.0), t * t),
        t
      );
    }
    
  tantric_fire: |
    // Tantric fire — black to red to orange to white
    vec3 tantricFire(float t) {
      t = clamp(t, 0.0, 1.0);
      if (t < 0.33) return mix(vec3(0.0), vec3(1.0, 0.0, 0.0), t * 3.0);
      if (t < 0.66) return mix(vec3(1.0, 0.0, 0.0), vec3(1.0, 0.5, 0.0), (t - 0.33) * 3.0);
      return mix(vec3(1.0, 0.5, 0.0), vec3(1.0, 1.0, 0.9), (t - 0.66) * 3.0);
    }
    
  void_bloom_glsl: |
    // Void Bloom — black to midnight blue to electric blue
    vec3 voidBloom(float t) {
      return pow(vec3(0.0, 0.0, 1.0) * t, vec3(0.5)) * vec3(0.3, 0.5, 1.0);
    }
